name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile.test -t hermes-test:ci .

      - name: Run tests
        run: docker run --rm hermes-test:ci pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile.test -t hermes-test:ci .

      - name: Run flake8
        run: |
          docker run --rm hermes-test:ci sh -c \
            'cd /opt/hermes/plugins/hermes_skill_mcp && flake8 *.py --max-line-length=80'

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f Dockerfile.test -t hermes-test:ci .

      - name: Run E2E tests
        env:
          HERMES_API_KEY: ${{ secrets.HERMES_API_KEY }}
          HERMES_API_URL: ${{ secrets.HERMES_API_URL }}
          HERMES_API_MODEL: ${{ secrets.HERMES_API_MODEL }}
        run: |
          docker run --rm \
            -e HERMES_API_KEY \
            -e HERMES_API_URL \
            -e HERMES_API_MODEL \
            hermes-test:ci pytest tests/test_skill_mcp.py::TestAgentE2E -v --tb=short
