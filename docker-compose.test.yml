# Hermes skill-mcp CI Test Compose
# CI: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from hermes-test
# Dev: export HERMES_API_KEY=... && docker compose -f docker-compose.test.yml up --build
services:
  hermes-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: hermes-skill-mcp-test:latest
    container_name: hermes-skill-mcp-test

    environment:
      - HERMES_API_KEY=${HERMES_API_KEY:-}
      - HERMES_API_URL=${HERMES_API_URL:-https://openrouter.ai/api/v1}
      - HERMES_API_MODEL=${HERMES_API_MODEL:-deepseek-v4-flash}

    command: ["pytest", "tests/", "-v", "--tb=short", "--color=yes"]
